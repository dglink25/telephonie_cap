<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Téléphonie CAP">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Téléphonie CAP">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Téléphonie CAP</title>
  <link rel="manifest" href="manifest.json">

  <script src="js/pusher.min.js"></script>

  <script>

    let _audioCtx = null;
  let _ringtoneInterval = null;

  function _unlockAudio() {
    if (!_audioCtx) {
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (_audioCtx.state === 'suspended') {
      _audioCtx.resume();
    }
  }

  document.addEventListener('click', _unlockAudio, { once: false });
  document.addEventListener('touchstart', _unlockAudio, { once: false });

  // Sonnerie synthétique — aucun fichier requis
  function _playSyntheticRingtone() {
    if (!_audioCtx) _unlockAudio();
    if (!_audioCtx || _audioCtx.state === 'suspended') return;
    
    const playBeep = (freq, start, duration) => {
      const osc = _audioCtx.createOscillator();
      const gain = _audioCtx.createGain();
      osc.connect(gain);
      gain.connect(_audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, _audioCtx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + start + duration);
      osc.start(_audioCtx.currentTime + start);
      osc.stop(_audioCtx.currentTime + start + duration + 0.05);
    };

    // Pattern: deux bips courts toutes les 2 secondes
    const ring = () => {
      playBeep(880, 0, 0.15);
      playBeep(880, 0.2, 0.15);
    };
    
    ring();
    return setInterval(ring, 2000);
  }

  window._playWebNotificationSound = function(type) {
    window._stopWebCallSound(); // arrêter le précédent
    
    if (type === 'call' || type === 'dialing') {
      // Tenter le fichier MP3 d'abord
      const audio = new Audio(
        type === 'call' 
          ? 'assets/assets/audio/ringtone.mp3' 
          : 'assets/assets/audio/dialing.mp3'
      );
      audio.loop = true;
      audio.volume = type === 'call' ? 1.0 : 0.5;
      
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise
          .then(() => { _callAudio = audio; })
          .catch(() => {
            // Fallback synthétique si MP3 bloqué
            _ringtoneInterval = _playSyntheticRingtone();
          });
      }
      _callAudio = audio;
    }
  };

  window._stopWebCallSound = function() {
    if (_callAudio) {
      try { _callAudio.pause(); _callAudio.currentTime = 0; } catch(_) {}
      _callAudio = null;
    }
    if (_ringtoneInterval) {
      clearInterval(_ringtoneInterval);
      _ringtoneInterval = null;
    }
  };
  
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        // Utiliser sw.js local, PAS firebase-messaging-sw.js
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(reg => console.log('[SW] Enregistré:', reg.scope))
          .catch(err => console.warn('[SW] Échec:', err));
      });
    }

    // Envoyer une notif d'appel depuis Flutter via postMessage au SW
    window._showCallNotificationViaSW = function(callerName, callType, callId, conversationId) {
      navigator.serviceWorker.ready.then(reg => {
        reg.active && reg.active.postMessage({
          type: 'SHOW_CALL_NOTIFICATION',
          callerName, callType, callId, conversationId
        });
      });
    };
  </script>


</head>
<body>
  
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
