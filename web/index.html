<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Téléphonie CAP">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Téléphonie CAP">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Téléphonie CAP</title>
  <link rel="manifest" href="manifest.json">

  <script src="js/pusher.min.js"></script>

  <script>
    // ── Enregistrement du Service Worker Firebase ─────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/firebase-messaging-sw.js', { scope: '/' })
          .then(function(registration) {
            console.log('[SW] Enregistré:', registration.scope);
          })
          .catch(function(err) {
            console.warn('[SW] Échec:', err);
          });

        // Écouter les messages du service worker (actions notif)
        navigator.serviceWorker.addEventListener('message', function(event) {
          const msg = event.data;
          if (!msg) return;

          if (msg.type === 'NAVIGATE' && msg.url) {
            // Flutter router handle via postMessage
            window._handleSWNavigation && window._handleSWNavigation(msg.url, msg.data);
          }
          if (msg.type === 'REJECT_CALL' && msg.callId) {
            window._handleSWRejectCall && window._handleSWRejectCall(msg.callId);
          }
        });
      });
    }

    // ── Config Reverb ─────────────────────────────────────────
    window.REVERB_HOST    = '192.168.100.195';
    window.REVERB_PORT    = 8080;
    window.REVERB_APP_KEY = 'xtsedffitwzc6vpwl7tz';
    window.REVERB_SCHEME  = 'http';

    // Surcharger Pusher pour pointer vers Reverb
    const _OriginalPusher = window.Pusher;
    window.Pusher = function(apiKey, options) {
      const reverbOptions = Object.assign({}, options, {
        wsHost:            window.REVERB_HOST,
        wsPort:            window.REVERB_PORT,
        wssPort:           window.REVERB_PORT,
        forceTLS:          window.REVERB_SCHEME === 'https',
        disableStats:      true,
        enabledTransports: ['ws'], 
        activityTimeout:   30000,
        pongTimeout:       10000,
      });
      return new _OriginalPusher(apiKey, reverbOptions);
    };
    Object.assign(window.Pusher, _OriginalPusher);
    window.Pusher.logToConsole = false;

    // ── Gestion permissions notifications ─────────────────────
    window._requestNotificationPermission = async function() {
      if (!('Notification' in window)) {
        console.warn('[Notif] API Notification non supportée');
        return false;
      }
      if (Notification.permission === 'granted') return true;
      if (Notification.permission === 'denied') return false;

      const permission = await Notification.requestPermission();
      return permission === 'granted';
    };

    // Demander la permission au chargement (après interaction utilisateur)
    document.addEventListener('click', function requestOnFirstClick() {
      window._requestNotificationPermission();
      document.removeEventListener('click', requestOnFirstClick);
    }, { once: true });

    // ── Notification web ──────────────────────────────────────
    window._showWebNotification = function(title, body, data) {
      if (!('Notification' in window)) return;
      if (Notification.permission !== 'granted') return;

      const isCall = data && data.type === 'incoming_call';

      // Utiliser le service worker pour les notifications persistantes
      if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        navigator.serviceWorker.ready.then(function(reg) {
          reg.showNotification(title, {
            body: body,
            icon: '/icons/Icon-192.png',
            badge: '/icons/Icon-192.png',
            tag: data && data.call_id ? 'call-' + data.call_id : 'msg-' + Date.now(),
            requireInteraction: isCall,
            vibrate: isCall ? [500, 200, 500] : [200],
            actions: isCall ? [
              { action: 'reject', title: '❌ Refuser' },
              { action: 'answer', title: '✅ Répondre' },
            ] : [],
            data: data || {},
          });
        });
        return;
      }

      // Fallback: notification basique si SW pas disponible
      if (document.visibilityState === 'visible' && !isCall) return;

      const notif = new Notification(title, {
        body: body,
        icon: '/icons/Icon-192.png',
        tag: data && data.call_id ? 'call-' + data.call_id : 'default',
        requireInteraction: isCall,
        data: data || {},
      });

      notif.onclick = function(e) {
        e.preventDefault();
        window.focus();
        notif.close();
        if (data && data.conversation_id) {
          window._handleSWNavigation && window._handleSWNavigation(
            '/conversations/' + data.conversation_id, data
          );
        }
      };

      if (!isCall) {
        setTimeout(() => notif.close(), 5000);
      }
    };

    // ── Audio de sonnerie web ─────────────────────────────────
    let _callAudio = null;
    let _dialingAudio = null;

    window._playWebNotificationSound = function(type) {
      try {
        window._stopWebCallSound(); // Stopper tout son précédent

        const audioPath = type === 'call'
          ? 'assets/assets/audio/ringtone.mp3'
          : type === 'dialing'
            ? 'assets/assets/audio/dialing.mp3'
            : 'assets/assets/audio/notification.mp3';

        const audio = new Audio(audioPath);

        if (type === 'call' || type === 'dialing') {
          audio.loop = true;
          audio.volume = type === 'call' ? 1.0 : 0.5;
          _callAudio = audio;
        }

        // Unlock audio context sur iOS Safari / Firefox
        const playPromise = audio.play();
        if (playPromise !== undefined) {
          playPromise.catch(function(e) {
            console.warn('[WebAudio] Autoplay bloqué, en attente interaction:', e.message);
            // Retry on user interaction
            document.addEventListener('touchstart', function retry() {
              audio.play().catch(console.warn);
              document.removeEventListener('touchstart', retry);
            }, { once: true });
            document.addEventListener('click', function retry() {
              audio.play().catch(console.warn);
              document.removeEventListener('click', retry);
            }, { once: true });
          });
        }
      } catch(e) {
        console.warn('[WebAudio] Erreur:', e);
      }
    };

    window._stopWebCallSound = function() {
      if (_callAudio) {
        try {
          _callAudio.pause();
          _callAudio.currentTime = 0;
        } catch(_) {}
        _callAudio = null;
      }
      if (_dialingAudio) {
        try {
          _dialingAudio.pause();
          _dialingAudio.currentTime = 0;
        } catch(_) {}
        _dialingAudio = null;
      }
    };

    // ── Wake Lock API (garder l'écran allumé pendant appel) ───
    window._requestWakeLock = async function() {
      if ('wakeLock' in navigator) {
        try {
          window._wakeLock = await navigator.wakeLock.request('screen');
          console.log('[WakeLock] Activé');
        } catch(e) {
          console.warn('[WakeLock] Erreur:', e.message);
        }
      }
    };

    window._releaseWakeLock = function() {
      if (window._wakeLock) {
        window._wakeLock.release().catch(console.warn);
        window._wakeLock = null;
        console.log('[WakeLock] Libéré');
      }
    };

    // ── Visibilité page ───────────────────────────────────────
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible') {
        console.log('[Page] Revenu au premier plan');
        // Relancer le Wake Lock si appel en cours
        if (window._callInProgress) {
          window._requestWakeLock();
        }
      }
    });
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
