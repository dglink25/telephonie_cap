name: telephonie_cap
description: "Téléphonie CAP - Application de communication interne"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP & API
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # WebSocket (Reverb/Pusher)
  pusher_channels_flutter: ^2.1.0

  # WebRTC
  flutter_webrtc: ^0.12.5

  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6

  # UI
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  flutter_svg: ^2.0.15
  shimmer: ^3.0.0
  timeago: ^3.7.0
  intl: ^0.19.0
  badges: ^3.1.2
  audio_waveforms: ^1.2.0
  lottie: ^3.3.1
  permission_handler: ^11.3.1

  # Utils
  equatable: ^2.0.7
  dartz: ^0.10.1
  logger: ^2.5.0
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  retrofit_generator: ^9.1.5
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800