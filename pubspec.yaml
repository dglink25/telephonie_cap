name: telephonie_cap
description: "Téléphonie CAP - Application de communication interne"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP & API
  dio: ^5.4.3

  # WebSocket (Pusher/Reverb)
  pusher_channels_flutter: ^2.1.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Time formatting
  timeago: ^3.6.1

  # Image picker & file picker
  image_picker: ^1.1.2
  file_picker: ^8.0.3

  # Cached images
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.19.0
  path_provider: ^2.1.4
  mime: ^1.0.5

  # URL launcher
  url_launcher: ^6.3.0

  # Permission handler
  permission_handler: ^11.3.1

  # Firebase Messaging (FCM)
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # Deep links
  app_links: ^6.0.0

  # WebRTC — uniquement sur native, le web utilise le stub
  flutter_webrtc: ^0.10.8

  # Notifications locales
  flutter_local_notifications: ^17.1.2

  # Audio & vibration — uniquement sur native
  audioplayers: ^5.2.1
  vibration: ^2.0.0

  # Open files
  open_filex: ^4.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  dart_webrtc: ^1.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800